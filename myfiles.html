<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Files • SpendGuard</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body { margin: 0; background: #0f172a; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 56px; background: #0f172a; border-bottom: 1px solid #1e293b; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
    .topbar-brand { font-size: 1.2rem; font-weight: 800; color: #fff; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .topbar-btn { color: #e5e7eb; text-decoration: none; padding: 7px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; border: 1px solid #1e293b; background: #111827; }
    .profile-btn { width: 34px; height: 34px; border-radius: 50%; background: #38bdf8; color: #fff; font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; text-decoration: none; }
    .app-shell { display: flex; margin-top: 56px; min-height: calc(100vh - 56px); }
    .sidebar { width: 220px; flex-shrink: 0; background: #0b1120; border-right: 1px solid #1e293b; padding: 24px 12px; position: fixed; top: 56px; bottom: 0; left: 0; overflow-y: auto; }
    .sidebar-label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: #475569; padding: 0 10px; margin-bottom: 8px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; text-decoration: none; color: #94a3b8; font-size: 0.875rem; font-weight: 500; transition: all 0.15s; margin-bottom: 2px; }
    .nav-item:hover { background: #1e293b; color: #e5e7eb; }
    .nav-item.active { background: rgba(56,189,248,0.1); color: #38bdf8; font-weight: 600; }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .main { margin-left: 220px; flex: 1; padding: 32px; }
    .page-title { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .page-sub { color: #64748b; font-size: 0.875rem; margin-bottom: 28px; }
    .files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; max-width: 1000px; }
    .file-card { background: #111827; border: 1px solid #1e293b; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .file-icon { font-size: 32px; }
    .file-name { color: #e5e7eb; font-weight: 600; font-size: 0.9rem; word-break: break-word; }
    .file-meta { color: #475569; font-size: 0.78rem; }
    .file-type-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
    .badge-bank { background: rgba(56,189,248,0.15); color: #38bdf8; }
    .badge-contract { background: rgba(16,185,129,0.15); color: #10b981; }
    .badge-unknown { background: rgba(100,116,139,0.15); color: #64748b; }
    .file-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-view { background: #1e293b; color: #e5e7eb; border: none; padding: 6px 14px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
    .btn-view:hover { background: #334155; }
    .btn-delete { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); padding: 6px 14px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
    .btn-delete:hover { background: rgba(239,68,68,0.2); }
    .empty-state { text-align: center; padding: 80px 20px; color: #475569; }
    .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
    .empty-state p { font-size: 0.95rem; margin-bottom: 16px; }
    .btn-upload-link { background: #38bdf8; color: #fff; text-decoration: none; padding: 10px 24px; border-radius: 8px; font-size: 0.875rem; font-weight: 600; }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-brand">SpendGuard</span>
    <div class="topbar-right">
      <a class="topbar-btn active" href="myfiles.html">📂 My Files</a>
      <a href="profile.html" class="profile-btn" id="profileBtn">P</a>
    </div>
  </div>
  <div class="app-shell">
    <nav class="sidebar">
      <div class="sidebar-label">Menu</div>
      <a class="nav-item" href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a class="nav-item" href="duplicate-payments.html"><span class="nav-icon">🔁</span> Duplicate Payments</a>
      <a class="nav-item" href="duplicate-subscriptions.html"><span class="nav-icon">📋</span> Duplicate Subscriptions</a>
      <a class="nav-item" href="contracts.html"><span class="nav-icon">📄</span> Contract Compliance</a>
      <div style="font-size:0.7rem;color:#475569;letter-spacing:2px;text-transform:uppercase;margin:16px 0 8px;padding-left:10px;">Account</div>
      <a class="nav-item" href="profile.html">👤 Profile</a>
    </nav>
    <main class="main">
      <div class="page-title">My Files</div>
      <div class="page-sub">All uploaded bank statements and contract PDFs.</div>
      <div id="filesGrid" class="files-grid"></div>
    </main>
  </div>

  <script>
    const user   = localStorage.getItem('spendguard_user');
    const userId = localStorage.getItem('spendguard_userId');
    if (user) document.getElementById('profileBtn').textContent = user.charAt(0).toUpperCase();

    function loadFiles() {
      const raw = localStorage.getItem('spendguard_files_' + userId);
      return raw ? JSON.parse(raw) : [];
    }

    function saveFiles(files) {
      localStorage.setItem('spendguard_files_' + userId, JSON.stringify(files));
    }

    function getFileType(name) {
      const n = name.toLowerCase();
      if (n.includes('contract') || n.includes('agreement')) return 'contract';
      if (n.includes('bank') || n.includes('statement') || n.includes('invoice')) return 'bank';
      return 'bank'; // default uploaded files are bank statements
    }

    function renderFiles() {
      var files = loadFiles();
      var grid  = document.getElementById('filesGrid');

      // Also load contracts from server and add them
      fetch('http://localhost:3000/api/get-contracts?userId=' + userId)
        .then(function(r) { return r.json(); })
        .then(function(contracts) {
          var allItems = '';

          // Bank statement files from localStorage
          for (var i = 0; i < files.length; i++) {
            var f = files[i];
            allItems += '<div class="file-card">';
            allItems += '<div class="file-icon">🏦</div>';
            allItems += '<div><div class="file-name">' + f.name + '</div><div class="file-meta">Uploaded ' + f.date + '</div></div>';
            allItems += '<span class="file-type-badge badge-bank">🏦 Bank Statement</span>';
            allItems += '<div class="file-actions"><button class="btn-delete" onclick="deleteFile(' + i + ')">🗑 Remove</button></div>';
            allItems += '</div>';
          }

          // Contract files from server
          for (var j = 0; j < contracts.length; j++) {
            var c = contracts[j];
            allItems += '<div class="file-card">';
            allItems += '<div class="file-icon">📄</div>';
            allItems += '<div><div class="file-name">Contract: ' + c.vendor + '</div><div class="file-meta">Max $' + parseFloat(c.maxAmount).toFixed(2) + '/mo</div></div>';
            allItems += '<span class="file-type-badge badge-contract">📄 Contract</span>';
            allItems += '<div class="file-actions"><button class="btn-delete" onclick="deleteContractFile(\'' + c.vendor.replace(/'/g, "\\'") + '\')">🗑 Remove</button></div>';
            allItems += '</div>';
          }

          if (!files.length && !contracts.length) {
            grid.innerHTML = '<div class="empty-state"><div class="icon">📂</div><p>No files uploaded yet.</p><a class="btn-upload-link" href="dashboard.html">Upload a Bank Statement</a></div>';
          } else {
            grid.innerHTML = allItems;
          }
        })
        .catch(function() {
          // If server fails, just show local files
          if (!files.length) {
            grid.innerHTML = '<div class="empty-state"><div class="icon">📂</div><p>No files uploaded yet.</p><a class="btn-upload-link" href="dashboard.html">Upload a Bank Statement</a></div>';
            return;
          }
          var html = '';
          for (var i = 0; i < files.length; i++) {
            var f = files[i];
            html += '<div class="file-card"><div class="file-icon">🏦</div><div><div class="file-name">' + f.name + '</div><div class="file-meta">Uploaded ' + f.date + '</div></div><span class="file-type-badge badge-bank">🏦 Bank Statement</span><div class="file-actions"><button class="btn-delete" onclick="deleteFile(' + i + ')">🗑 Remove</button></div></div>';
          }
          grid.innerHTML = html;
        });
    }

    function deleteFile(index) {
      if (!confirm('Remove this file from your list?')) return;
      const files = loadFiles();
      files.splice(index, 1);
      saveFiles(files);
      renderFiles();
    }

    function deleteContractFile(vendor) {
      if (!confirm('Remove contract for ' + vendor + '?')) return;
      fetch('http://localhost:3000/api/remove-contract', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: parseInt(userId), vendor: vendor })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) { renderFiles(); }
        else { alert('Error: ' + data.error); }
      })
      .catch(function(e) { alert('Error: ' + e.message); });
    }

    renderFiles();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • SpendGuard</title>
  <style>
    body {
      display: flex; justify-content: center; align-items: center;
      height: 100vh; margin: 0; background-color: #0f172a;
    }
    .login-card {
      background: #111827; border: 1px solid #1e293b;
      padding: 40px; border-radius: 16px; width: 100%;
      max-width: 400px; text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    .brand { color: #38bdf8; font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
    .login-card h2 { margin-top: 0; font-size: 1.5rem; font-weight: 700; color: #ffffff; }
    .login-card p  { color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px; }
    .input-group { text-align: left; margin-bottom: 20px; }
    .input-group label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 6px; }
    .input-group input {
      width: 100%; padding: 12px; background: #0b1120;
      border: 1px solid #1e293b; border-radius: 8px; color: white;
      outline: none; box-sizing: border-box; font-size: 0.9rem; transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: #38bdf8; }
    .btn-login-submit {
      width: 100%; background: #38bdf8; color: white; border: none;
      padding: 12px; border-radius: 8px; font-weight: 700;
      cursor: pointer; font-size: 0.95rem; transition: background 0.2s;
    }
    .btn-login-submit:hover { background: #0ea5e9; }
    .error-msg {
      display: none; background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3); color: #ef4444;
      border-radius: 8px; padding: 10px; margin-bottom: 16px; font-size: 0.85rem;
    }
    .signup-link { margin-top: 20px; font-size: 0.875rem; color: #64748b; }
    .signup-link a { color: #38bdf8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">SpendGuard</div>
    <h2>Welcome back</h2>
    <p>Enter your details to access your dashboard.</p>

    <div class="error-msg" id="errorMsg"></div>

    <div class="input-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" />
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn-login-submit" id="btnLogin">Login</button>

    <div class="signup-link">
      New here? <a href="signup.html">Create an account</a>
    </div>
  </div>

  <script>
    document.getElementById('btnLogin').addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      if (!username || !password) {
        errorMsg.textContent = 'Please enter your username and password.';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        // Try backend
        const res = await fetch('http://localhost:8080/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('spendguard_user',   data.username);
          localStorage.setItem('spendguard_userId', data.id);
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.textContent = data.error || 'Invalid username or password.';
          errorMsg.style.display = 'block';
        }

      } catch (err) {
        // Demo mode — backend not running yet
        if (username === 'admin' && password === 'admin123') {
          localStorage.setItem('spendguard_user',   username);
          localStorage.setItem('spendguard_userId', '1');
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.textContent = 'Cannot connect to server. Use admin / admin123 to demo.';
          errorMsg.style.display = 'block';
        }
      }
    });

    // Enter key submits
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });
  </script>
</body>
</html>

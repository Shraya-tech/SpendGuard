<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Duplicate Subscriptions • SpendGuard</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body { margin: 0; background: #0f172a; display: flex; flex-direction: column; min-height: 100vh; font-family: sans-serif; }
    .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 56px; background: #0f172a; border-bottom: 1px solid #1e293b; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
    .topbar-brand { font-size: 1.2rem; font-weight: 800; color: #ffffff; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .topbar-btn { color: #e5e7eb; text-decoration: none; padding: 7px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; border: 1px solid #1e293b; background: #111827; transition: all 0.2s; }
    .profile-btn { width: 34px; height: 34px; border-radius: 50%; background: #38bdf8; color: #fff; font-weight: 700; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 0.85rem; }
    .app-shell { display: flex; margin-top: 56px; min-height: calc(100vh - 56px); }
    .sidebar { width: 220px; flex-shrink: 0; background: #0b1120; border-right: 1px solid #1e293b; padding: 24px 12px; position: fixed; top: 56px; bottom: 0; left: 0; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; text-decoration: none; color: #94a3b8; font-size: 0.875rem; margin-bottom: 2px; }
    .nav-item:hover { background: #1e293b; color: #e5e7eb; }
    .nav-item.active { background: rgba(56,189,248,0.1); color: #38bdf8; font-weight: 600; }
    .main { margin-left: 220px; flex: 1; padding: 32px; color: white; }
    .module-card { background: #111827; border: 1px solid #1e293b; border-radius: 14px; padding: 28px; }
    .search-input { width: 100%; background: #0b1120; border: 1px solid #1e293b; border-radius: 8px; color: #e5e7eb; padding: 12px; margin-bottom: 20px; font-size: 0.9rem; box-sizing: border-box; }
    .btn-action { background: #38bdf8; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.875rem; }
    .btn-action:hover { background: #0ea5e9; }
    .results-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    .results-table th { text-align: left; color: #64748b; font-size: 0.78rem; text-transform: uppercase; padding: 8px 12px; border-bottom: 1px solid #1e293b; }
    .results-table td { padding: 10px 12px; color: #e5e7eb; font-size: 0.875rem; border-bottom: 1px solid #1e293b; }
    .results-table tr:hover td { background: #0b1120; }
    .badge-dupe { background: rgba(239,68,68,0.1); color: #ef4444; padding: 3px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
  </style>
</head>
<body>

  <div class="topbar">
    <span class="topbar-brand">SpendGuard</span>
    <div class="topbar-right">
      <a class="topbar-btn" href="my-files.html">📂 My Files</a>
      <a href="profile.html" class="profile-btn" id="profileBtn">P</a>
    </div>
  </div>

  <div class="app-shell">
    <nav class="sidebar">
      <div style="font-size:0.7rem;color:#475569;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding-left:10px;">Menu</div>
      <a class="nav-item" href="dashboard.html">🏠 Dashboard</a>
      <a class="nav-item" href="duplicate-payments.html">🔁 Duplicate Payments</a>
      <a class="nav-item active" href="duplicate-subscriptions.html">📋 Duplicate Subscriptions</a>
      <a class="nav-item" href="contracts.html">📄 Contract Compliance</a>
      <div style="font-size:0.7rem;color:#475569;letter-spacing:2px;text-transform:uppercase;margin:16px 0 8px;padding-left:10px;">Account</div>
      <a class="nav-item" href="profile.html">👤 Profile</a>
    </nav>

    <main class="main">
      <h2>Duplicate Subscriptions</h2>
      <p style="color:#64748b;">Search and display duplicate subscription violations.</p>

      <div class="module-card">
        <label style="display:block;margin-bottom:8px;font-weight:600;color:#94a3b8;">Search Service Name</label>
        <input type="text" class="search-input" id="serviceSearch" placeholder="Enter service (e.g. Netflix)..." />
        <button class="btn-action" id="btnSearch">Search History</button>

        <div style="margin-top:30px;border-top:1px solid #1e293b;padding-top:20px;">
          <h4 style="margin-top:0;">Display Results</h4>
          <div id="resultsArea">
            <p style="font-size:0.85rem;color:#64748b;">No duplicate subscriptions found for this service.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const user = localStorage.getItem('spendguard_user');
    if (user) document.getElementById('profileBtn').textContent = user.charAt(0).toUpperCase();

    document.getElementById('btnSearch').addEventListener('click', async () => {
      const service = document.getElementById('serviceSearch').value.trim();
      const userId  = localStorage.getItem('spendguard_userId');
      const area    = document.getElementById('resultsArea');

      if (!service) { alert('Please enter a service name.'); return; }

      area.innerHTML = '<p style="color:#64748b;font-size:0.85rem;">Searching...</p>';

      try {
        const res  = await fetch(`http://localhost:8080/api/subscriptions/duplicates?userId=${userId}&service=${encodeURIComponent(service)}`);
        const data = await res.json();

        if (!data.length) {
          area.innerHTML = '<p style="font-size:0.85rem;color:#10b981;">✅ No duplicate subscriptions found for this service.</p>';
          return;
        }

        let html = `<table class="results-table">
          <thead><tr><th>Service</th><th>Vendor</th><th>Cost</th><th>Status</th></tr></thead><tbody>`;
        data.forEach(s => {
          html += `<tr>
            <td>${s.service_name}</td>
            <td>${s.vendor || '—'}</td>
            <td>$${parseFloat(s.cost).toFixed(2)}</td>
            <td><span class="badge-dupe">Duplicate</span></td>
          </tr>`;
        });
        html += '</tbody></table>';
        area.innerHTML = html;

      } catch (err) {
        area.innerHTML = '<p style="font-size:0.85rem;color:#64748b;">Could not connect to server.</p>';
      }
    });
  </script>

</body>
</html>

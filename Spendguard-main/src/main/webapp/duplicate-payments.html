<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Duplicate Payments • SpendGuard</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    /* These styles match your dashboard.html exactly */
    body { margin: 0; background: #0f172a; display: flex; flex-direction: column; min-height: 100vh; font-family: sans-serif; }
    
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 56px; background: #0f172a; border-bottom: 1px solid #1e293b;
      display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
    }
    .topbar-brand { font-size: 1.2rem; font-weight: 800; color: #ffffff; }
    .topbar-right  { display: flex; align-items: center; gap: 10px; }
    .topbar-btn {
      color: #e5e7eb; text-decoration: none; padding: 7px 16px;
      border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      border: 1px solid #1e293b; background: #111827; transition: all 0.2s;
    }
    .profile-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: #38bdf8; color: #fff; font-weight: 700; display: flex; align-items: center; justify-content: center;
    }

    .app-shell { display: flex; margin-top: 56px; min-height: calc(100vh - 56px); }

    /* Left Sidebar List */
    .sidebar {
      width: 220px; flex-shrink: 0; background: #0b1120;
      border-right: 1px solid #1e293b; padding: 24px 12px;
      position: fixed; top: 56px; bottom: 0; left: 0;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px; text-decoration: none;
      color: #94a3b8; font-size: 0.875rem; margin-bottom: 2px;
    }
    .nav-item.active { background: rgba(56,189,248,0.1); color: #38bdf8; font-weight: 600; }

    /* Main Section */
    .main { margin-left: 220px; flex: 1; padding: 32px; color: white; }
    .module-card {
      background: #111827; border: 1px solid #1e293b;
      border-radius: 14px; padding: 28px;
    }
    .search-input {
      width: 100%; background: #0b1120; border: 1px solid #1e293b;
      border-radius: 8px; color: #e5e7eb; padding: 12px; margin-bottom: 20px;
    }
    .btn-action {
      background: #38bdf8; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <span class="topbar-brand">SpendGuard</span>
    <div class="topbar-right">
      <a class="topbar-btn" href="myfiles.html">📂 My Files</a>
      <div class="profile-btn">P</div>
    </div>
  </div>

  <div class="app-shell">
    <nav class="sidebar">
      <div style="font-size: 0.7rem; color: #475569; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; padding-left: 10px;">Menu</div>
      <a class="nav-item" href="dashboard.html">🏠 Dashboard</a>
      <a class="nav-item active" href="duplicate-payments.html">🔁 Duplicate Payments</a>
      <a class="nav-item" href="duplicate-subscriptions.html">📋 Duplicate Subscriptions</a>
      <a class="nav-item" href="contracts.html">📄 Contract Compliance</a>
    </nav>

    <main class="main">
      <h2>Duplicate Payments</h2>
      <p style="color: #64748b;">Search and display duplicate payment violations.</p>

      <div class="module-card">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #94a3b8;">Search Vendor Name</label>
        <input type="text" class="search-input" placeholder="Enter vendor (e.g. Adobe)...">
        <button class="btn-action">Search History</button>
        
        <div style="margin-top: 30px; border-top: 1px solid #1e293b; pt: 20px;">
          <h4 style="margin-top: 20px;">Display Results</h4>
          <p style="font-size: 0.85rem; color: #64748b;">No duplicate payments found for this vendor.</p>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
